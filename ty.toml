[environment]
python-version = "3.10"

[rules]
invalid-return-type = "warn"
invalid-argument-type = "warn"
unresolved-attribute = "warn"
unresolved-reference = "warn"

[analysis]
allowed-unresolved-imports = ["shap", "skforecast", "shapiq", "econml.**", "dowhy.**", "causallearn.**", "networkx"]
# Replace pandas / numpy / matplotlib imports with Any.
# These libraries have dynamic APIs that don't lend themselves to static
# type-checking, and matplotlib stubs in particular differ between OS /
# matplotlib versions, producing inconsistent CI vs local results.
replace-imports-with-any = ["pandas.**", "numpy.**", "matplotlib.**"]


[src]
exclude = ["*.ipynb", "data/**", "notebooks/**", "examples/**" ]
